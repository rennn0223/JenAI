name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests (with coverage)
        # No ROS in CI: the suite is designed to pass without ros2 on PATH
        # (ROS-touching checks report unavailable instead of failing).
        run: uv run pytest -q --cov=jenai --cov-report=term

      - name: Coverage summary
        run: |
          {
            echo "## Coverage"
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test the wheel (install, deps, entry point)
        # uvx installs ONLY the wheel + its declared dependencies into a fresh
        # env — catches a dependency that pyproject forgot but the dev venv has.
        run: uvx --from ./dist/jenai-*-py3-none-any.whl jenai --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
