name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests (with coverage)
        # No ROS in CI: the suite is designed to pass without ros2 on PATH
        # (ROS-touching checks report unavailable instead of failing).
        run: uv run pytest -q --cov=jenai --cov-report=term

      - name: Coverage summary
        run: |
          {
            echo "## Coverage"
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Safety-chain coverage gate (no regressions)
        # Reuses the .coverage data from the test step. The safety chain
        # (estop/watchdog/bridge/gate/rules) sits at 92% as of v0.11 — this
        # gate only ever ratchets up, never down (see docs/V1_GATE.md A3).
        run: |
          # Exclude ros_bridge.py itself: the rclpy sidecar needs hardware.
          # Its stdlib-only sibling state modules are included and unit-tested.
          uv run coverage report --fail-under=90 \
            --include="*/jenai/bridge/client.py,*/jenai/bridge/_*.py,*/jenai/daemon/*,*/jenai/twin/*,*/jenai/tools/safety.py"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test the wheel (install, deps, entry point)
        # uvx installs ONLY the wheel + its declared dependencies into a fresh
        # env — catches a dependency that pyproject forgot but the dev venv has.
        run: uvx --from ./dist/jenai-*-py3-none-any.whl jenai --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
