name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests
        # No ROS in CI: the suite is designed to pass without ros2 on PATH
        # (ROS-touching checks report unavailable instead of failing).
        run: uv run pytest -q
