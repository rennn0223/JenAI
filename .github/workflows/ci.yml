name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tests (with coverage)
        # No ROS in CI: the suite is designed to pass without ros2 on PATH
        # (ROS-touching checks report unavailable instead of failing).
        run: uv run pytest -q --cov=jenai --cov-report=term

      - name: Coverage summary
        run: |
          {
            echo "## Coverage"
            uv run coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Safety-chain coverage gate (no regressions)
        # Reuses the .coverage data from the test step. The safety chain
        # (estop/watchdog/bridge/gate/rules) sits at 92% as of v0.11 — this
        # gate only ever ratchets up, never down (see docs/V1_GATE.md A3).
        run: |
          # Exclude ros_bridge.py itself: the rclpy sidecar needs hardware.
          # Its stdlib-only sibling state modules are included and unit-tested.
          uv run coverage report --fail-under=90 \
            --include="*/jenai/bridge/client.py,*/jenai/bridge/_*.py,*/jenai/daemon/*,*/jenai/twin/*,*/jenai/tools/safety.py"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test wheel lifecycle in a fresh tool environment
        run: |
          mapfile -t wheels < <(find dist -name "jenai-*-py3-none-any.whl" -print)
          test "${#wheels[@]}" -eq 1
          wheel="${wheels[0]}"
          export UV_TOOL_DIR="${RUNNER_TEMP}/jenai-smoke-tools"
          export UV_TOOL_BIN_DIR="${RUNNER_TEMP}/jenai-smoke-bin"
          export XDG_CONFIG_HOME="${RUNNER_TEMP}/jenai-smoke-config"
          trap 'uv tool uninstall jenai >/dev/null 2>&1 || true' EXIT
          uv tool install --force "$wheel"
          "${UV_TOOL_BIN_DIR}/JenAI" version
          "${UV_TOOL_BIN_DIR}/jenai" --help >/dev/null
          "${UV_TOOL_BIN_DIR}/jenai" doctor --json > "${RUNNER_TEMP}/jenai-doctor.json"
          uv run python -c 'import json, os; d=json.load(open(os.environ["RUNNER_TEMP"]+"/jenai-doctor.json")); assert d["overall"] == "fail"; assert any(i["check_name"] == "config_file" for i in d["items"])'
          uv tool uninstall jenai
          test ! -e "${UV_TOOL_BIN_DIR}/JenAI"
          test ! -e "${UV_TOOL_BIN_DIR}/jenai"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
