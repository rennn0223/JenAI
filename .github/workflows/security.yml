name: Supply Chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Export locked runtime dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements.txt --output-file /tmp/jenai-requirements.txt

      - name: Audit known Python vulnerabilities
        run: uvx pip-audit --requirement /tmp/jenai-requirements.txt --strict

      - name: Generate CycloneDX SBOM from uv.lock
        run: uv export --frozen --no-dev --format cyclonedx1.5 --output-file jenai.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jenai-sbom
          path: jenai.cdx.json
