# Fires on a version tag push, or via manual workflow_dispatch (which creates
# the tag itself — for sessions/environments that can push branches but not
# tags). Gates the tag on the full suite, builds the wheel/sdist, and attaches
# the artifacts.
# Notes policy: on manual dispatch the release is PUBLISHED directly from
# docs/releases/<tag>.md (the dispatch click IS the human gate; missing notes
# file fails the run — no accidental auto-notes publish). On tag push the
# behavior is unchanged: a DRAFT with auto-generated notes, published by hand
# via `gh release edit vX.Y.Z --notes-file docs/releases/vX.Y.Z.md --draft=false`.
# If a release for the tag already exists (draft or published), the workflow
# only attaches the artifacts and never touches the notes.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to create and release (vX.Y.Z, must match pyproject)"
        required: true

permissions:
  contents: write

# One run per tag: a delete-and-re-push cancels the stale run instead of
# letting it clobber the corrected artifacts or double-draft.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Tag under release: the dispatch input, or the pushed tag ref.
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tag must match pyproject version
        run: |
          version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v${version}" != "${TAG}" ]; then
            echo "::error::tag ${TAG} does not match pyproject version ${version}"
            exit 1
          fi

      - name: Gate the tag (lint + full suite)
        run: |
          uv run ruff check src tests
          uv run pytest -q

      - name: Create and push the tag (manual dispatch only)
        # A tag pushed with GITHUB_TOKEN does not trigger the push:tags event
        # (Actions' recursion guard), so this same run carries on to release it.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag ${TAG} already exists on origin — releasing it as-is"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "JenAI ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test the wheel (install, deps, entry point)
        # Same gate as ci.yml's build job — these are the artifacts being
        # released, so they get at least the same validation as PR artifacts.
        run: uvx --from ./dist/jenai-*-py3-none-any.whl jenai --help

      - name: Release with artifacts (or attach to an existing release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
            # Manual dispatch is the human gate: it may also FINISH a
            # tag-push draft — swap in the reviewed notes file and publish.
            # A tag-push run still never touches an existing release's notes.
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] \
               && [ -f "docs/releases/${TAG}.md" ] \
               && [ "$(gh release view "${TAG}" --json isDraft --jq .isDraft)" = "true" ]; then
              gh release edit "${TAG}" --title "${TAG}" \
                --notes-file "docs/releases/${TAG}.md" --draft=false
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            # Dispatch is the human gate; the reviewed notes file is mandatory.
            gh release create "${TAG}" dist/* \
              --title "${TAG}" --notes-file "docs/releases/${TAG}.md"
          else
            gh release create "${TAG}" dist/* \
              --title "${TAG}" --generate-notes --draft
          fi
