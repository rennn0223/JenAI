# Fires on a version tag push. Gates the tag on the full suite, builds the
# wheel/sdist, and creates a DRAFT release with auto-generated notes and the
# artifacts attached. The release flow stays: tag → this workflow drafts →
# hand-written notes are filled in via `gh release edit` → publish.
# If a release for the tag already exists (draft or published), the workflow
# only attaches the artifacts and never touches the notes.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# One run per tag: a delete-and-re-push cancels the stale run instead of
# letting it clobber the corrected artifacts or double-draft.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tag must match pyproject version
        run: |
          version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match pyproject version ${version}"
            exit 1
          fi

      - name: Gate the tag (lint + full suite)
        run: |
          uv run ruff check src tests
          uv run pytest -q

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test the wheel (install, deps, entry point)
        # Same gate as ci.yml's build job — these are the artifacts being
        # released, so they get at least the same validation as PR artifacts.
        run: uvx --from ./dist/jenai-*-py3-none-any.whl jenai --help

      - name: Draft release with artifacts (or attach to an existing release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" --generate-notes --draft
          fi
